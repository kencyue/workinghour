<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>空調零件工時管理系統</title>
    <style>
        :root {
            --bg-color: #f8fafc; --card-bg: #ffffff; --primary: #0f172a;
            --admin-color: #059669; --border-color: #e2e8f0; --text-main: #334155;
            --text-muted: #64748b; --hover-bg: #f1f5f9;
        }

        body { font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 30px 20px; }
        .container { max-width: 1200px; margin: auto; background: var(--card-bg); padding: 30px; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); padding-bottom: 16px; margin-bottom: 24px; }
        .header h1 { margin: 0; font-size: 1.5rem; color: var(--primary); }
        .user-info { font-size: 0.9rem; color: var(--text-muted); display: flex; align-items: center; gap: 12px; }

        input, select { padding: 10px 12px; border: 1px solid var(--border-color); border-radius: 6px; font-size: 0.95rem; outline: none; transition: all 0.2s; background: #fff; width: 100%; box-sizing: border-box; }
        input:focus, select:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.1); }

        .btn { padding: 10px 16px; border: none; border-radius: 6px; font-size: 0.95rem; font-weight: 500; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
        .btn-primary { background: #3b82f6; color: white; }
        .btn-primary:hover { background: #2563eb; }
        .btn-outline { background: white; border: 1px solid var(--border-color); color: var(--text-main); }
        .btn-outline:hover { background: var(--hover-bg); }
        .btn-outline:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-save { background: var(--admin-color); color: white; width: 100%; margin-top: 10px; }

        .search-section { background: var(--bg-color); padding: 20px; border-radius: 12px; margin-bottom: 24px; display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; }
        .full-search { grid-column: 1 / -1; }

        #adminArea { display: none; background: #ffffff; padding: 20px; border-radius: 12px; margin-bottom: 24px; border: 1px solid var(--border-color); }
        #toggleFormBtn { width: 100%; background: #ecfdf5; color: var(--admin-color); border: 1px dashed var(--admin-color); padding: 12px; font-weight: bold; margin-bottom: 15px;}
        #toggleFormBtn:hover { background: #d1fae5; }
        #formWrapper { display: none; padding-top: 15px; border-top: 1px solid #e2e8f0; }
        .input-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; }

        .table-controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; font-size: 0.9rem; flex-wrap: wrap; gap: 10px;}
        .page-size-input { width: 60px; text-align: center; margin: 0 5px; padding: 6px; display: inline-block; }
        
        table { width: 100%; border-collapse: collapse; font-size: 0.95rem; }
        th, td { padding: 12px 16px; text-align: left; border-bottom: 1px solid var(--border-color); }
        th.sortable { color: var(--text-muted); font-weight: 600; cursor: pointer; user-select: none; transition: background 0.2s; white-space: nowrap; }
        th.sortable:hover { background-color: var(--hover-bg); color: var(--primary); }
        .sort-icon { display: inline-block; width: 16px; font-size: 0.8rem; color: #94a3b8; text-align: center; }
        
        tbody td { transition: background 0.2s; cursor: pointer; user-select: none; touch-action: manipulation; } 
        tbody tr:hover td { background-color: var(--hover-bg); }
        
        .editable[contenteditable="true"] { user-select: auto; } 
        .editable[contenteditable="true"]:hover { background: #fef9c3 !important; border-radius: 4px; }
        .editable[contenteditable="true"]:focus { background: #fef08a !important; outline: none; border-radius: 4px; box-shadow: 0 0 0 2px #eab308; }

        .pagination { display: flex; justify-content: center; align-items: center; flex-wrap: wrap; gap: 15px; margin-top: 20px; }
        .badge-admin { background: #d1fae5; color: #065f46; padding: 4px 10px; border-radius: 999px; font-size: 0.8rem; font-weight: 600; }

        #toastContainer { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; gap: 10px; z-index: 9999; pointer-events: none; width: 90%; max-width: 400px; }
        .toast { padding: 14px 20px; background: white; border-radius: 8px; box-shadow: 0 10px 25px rgba(0,0,0,0.15); font-weight: 500; display: flex; align-items: center; transform: translateY(120%); opacity: 0; transition: all 0.3s; border-left: 5px solid transparent; pointer-events: auto; font-size: 0.95rem;}
        .toast.show { transform: translateY(0); opacity: 1; }
        .toast-success { border-left-color: #10b981; } .toast-error { border-left-color: #ef4444; } .toast-info { border-left-color: #3b82f6; }

        /* =========================================
           ✨ 修正版手機 RWD：完美對齊與防跑版
           ========================================= */
        @media (max-width: 768px) {
            body { padding: 10px; }
            .container { padding: 15px; border-radius: 12px; }
            
            .header { flex-direction: column; align-items: flex-start; gap: 12px; }
            .user-info { width: 100%; justify-content: space-between; }
            
            .search-section { padding: 15px; }
            .input-row { grid-template-columns: 1fr; } 
            
            table, thead, tbody, th, td, tr { display: block; }
            thead { display: none; } /* 徹底隱藏表頭避免干擾 */
            
            tbody tr { 
                margin-bottom: 20px; 
                border: 1px solid var(--border-color); 
                border-radius: 12px; 
                background: #fff;
                box-shadow: 0 4px 6px rgba(0,0,0,0.04);
                padding: 8px 0; /* 給卡片上下加一點內距 */
            }
            
            tbody td { 
                display: flex; 
                justify-content: flex-start; 
                align-items: flex-start; /* 針對多行文字靠上對齊 */
                border-bottom: 1px solid #f1f5f9; 
                padding: 12px 16px; 
                font-size: 0.95rem;
                gap: 12px; /* 標題與內容的間距 */
            }
            tbody td:last-child { border-bottom: none; background-color: #f8fafc; border-radius: 0 0 12px 12px;} 
            
            /* 【修正重點一】：鎖定標題寬度，保證對齊基準線 */
            tbody td::before { 
                content: attr(data-label); 
                font-weight: 600; 
                color: var(--text-muted); 
                flex-shrink: 0; /* 絕對不允許縮水 */
                width: 80px;    /* 固定標題寬度 */
                text-align: left;
            }
            
            /* 【修正重點二】：右側內容自動伸展，且允許長英文字串斷行 */
            .editable, tbody td > span {
                flex-grow: 1; 
                text-align: right; 
                word-break: break-all; /* 防止長品番撐破版面 */
                min-height: 1.2em; /* 確保空白欄位也有高度可點擊 */
            }
            
            .table-controls { flex-direction: column; align-items: stretch; gap: 15px; }
            .table-controls > div { display: flex; justify-content: space-between; align-items: center; }
            
            .pagination { flex-wrap: nowrap; justify-content: space-between; gap: 10px; }
            .btn { width: 100%; text-align: center; } 
            .pagination .btn { width: auto; flex: 1; padding: 12px; }
            #pageInfo { flex: 1; text-align: center; white-space: nowrap; font-size: 0.85rem;}
        }
    </style>
</head>
<body>

<datalist id="listCategory"></datalist>
<datalist id="listModel"></datalist>
<datalist id="listCapacity"></datalist>
<datalist id="listPartName"></datalist>

<div class="container">
    <div class="header">
        <h1>工時費查詢系統</h1>
        <div id="authArea"><button class="btn btn-primary" id="loginBtn">管理員登入</button></div>
    </div>

    <div class="search-section">
        <input type="text" id="globalSearch" class="full-search" placeholder="🔍 全域搜尋 (可直接輸入機種、品番等關鍵字)...">
        <select id="filterCategory"><option value="">所有類別</option></select>
        <select id="filterCapacity"><option value="">所有能力別</option></select>
    </div>

    <div id="adminArea">
        <button id="toggleFormBtn" class="btn">➕ 展開建檔表單</button>
        <div id="formWrapper">
            <p style="font-size: 0.85rem; color: var(--text-muted); margin-top: 0;">提示：點擊下方資料卡可帶入；輸入類別後，能力別會自動限縮。</p>
            <form id="addForm" class="input-row">
                <input type="text" id="inCat" list="listCategory" placeholder="類別" required>
                <input type="text" id="inModel" list="listModel" placeholder="機種" required>
                <input type="text" id="inCap" list="listCapacity" placeholder="能力別" required>
                <input type="text" id="inName" list="listPartName" placeholder="零件名稱" required>
                <input type="text" id="inNo" placeholder="品番" required>
                <input type="number" id="inTime" placeholder="工時(分)" required>
                <button type="submit" class="btn btn-save">儲存寫入資料庫</button>
            </form>
        </div>
    </div>

    <div class="table-controls">
        <div style="color:var(--text-muted); font-size:0.85rem;" id="dataCount">載入中...</div>
        <div>
            <label>每頁顯示 <input type="number" id="pageSizeInput" class="page-size-input" value="10" min="1" max="100"> 筆</label>
        </div>
    </div>

    <table id="mainTable">
        <thead>
            <tr>
                <th class="sortable" data-sort="category">類別 <span class="sort-icon"></span></th>
                <th class="sortable" data-sort="machineModel">機種 <span class="sort-icon"></span></th>
                <th class="sortable" data-sort="capacity">能力別 <span class="sort-icon"></span></th>
                <th class="sortable" data-sort="partName">零件名稱 <span class="sort-icon"></span></th>
                <th class="sortable" data-sort="partNumber">品番 <span class="sort-icon"></span></th>
                <th class="sortable" data-sort="laborTime">工時(分) <span class="sort-icon"></span></th>
            </tr>
        </thead>
        <tbody id="tableBody">
            <tr><td colspan="6" style="text-align:center; padding: 40px; color: #94a3b8;">資料載入中...</td></tr>
        </tbody>
    </table>

    <div class="pagination">
        <button id="prevBtn" class="btn btn-outline">◄ 上一頁</button>
        <span id="pageInfo" style="font-size:0.9rem; color:var(--text-muted)">第 1 頁 / 共 1 頁</span>
        <button id="nextBtn" class="btn btn-outline">下一頁 ►</button>
    </div>
</div>

<div id="toastContainer"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, limit, orderBy, updateDoc, doc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDvTOPoq1WdGLCOafP6GSZlxKR8TzM0Aqs",
        authDomain: "working-hours-dce8e.firebaseapp.com",
        projectId: "working-hours-dce8e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();
    const adminEmail = "jingsyuan@gmail.com";

    let isAdmin = false;
    let allData = [];
    let currentPage = 1;
    let itemsPerPage = 10;
    let currentSort = { field: 'createdAt', isAsc: false };

    function showToast(message, type = 'success') {
        const container = document.getElementById('toastContainer');
        const toast = document.createElement('div');
        toast.className = `toast toast-${type}`;
        toast.innerHTML = `<span style="margin-right:8px">${type === 'success'?'✅':type==='error'?'❌':'📋'}</span> ${message}`;
        container.appendChild(toast);
        setTimeout(() => toast.classList.add('show'), 10);
        setTimeout(() => { toast.classList.remove('show'); setTimeout(() => toast.remove(), 300); }, 2500); 
    }

    async function copyToClipboard(text) {
        if (!text) return;
        try {
            if (navigator.clipboard) await navigator.clipboard.writeText(text);
            else { const ta = document.createElement("textarea"); ta.value = text; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); }
            showToast(`已複製：${text}`, 'info');
        } catch (err) {}
    }

    const formWrapper = document.getElementById('formWrapper');
    const toggleBtn = document.getElementById('toggleFormBtn');
    toggleBtn.onclick = () => {
        const isHidden = formWrapper.style.display === '' || formWrapper.style.display === 'none';
        formWrapper.style.display = isHidden ? 'block' : 'none';
        toggleBtn.innerHTML = isHidden ? '➖ 收起建檔表單' : '➕ 展開建檔表單';
    };

    onAuthStateChanged(auth, (user) => {
        const authArea = document.getElementById('authArea');
        const adminArea = document.getElementById('adminArea');
        if (user) {
            isAdmin = user.email === adminEmail;
            authArea.innerHTML = `<div class="user-info">${isAdmin ? '<span class="badge-admin">管理員</span>' : ''}<span>${user.email}</span><button class="btn btn-outline" id="logoutBtn" style="padding:8px;font-size:0.8rem">登出</button></div>`;
            document.getElementById('logoutBtn').onclick = () => { signOut(auth); showToast('已登出', 'info'); };
            if (isAdmin) adminArea.style.display = "block";
        } else {
            isAdmin = false; adminArea.style.display = "none";
            authArea.innerHTML = `<button class="btn btn-primary" id="loginBtn">管理員登入</button>`;
            document.getElementById('loginBtn').onclick = () => signInWithPopup(auth, provider);
        }
        renderTable();
    });

    const q = query(collection(db, "labor_costs"), orderBy("createdAt", "desc"), limit(500));
    onSnapshot(q, (snapshot) => {
        allData = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
        updateBaseFilters();
        renderTable();
    });

    document.querySelectorAll('th.sortable').forEach(th => {
        th.addEventListener('click', () => {
            const field = th.dataset.sort;
            if (currentSort.field === field) { currentSort.isAsc = !currentSort.isAsc; } 
            else { currentSort.field = field; currentSort.isAsc = true; }
            currentPage = 1; 
            renderTable();
        });
    });

    document.getElementById('pageSizeInput').addEventListener('change', (e) => {
        let val = parseInt(e.target.value);
        if(val < 1) val = 1;
        itemsPerPage = val;
        currentPage = 1;
        renderTable();
    });

    function renderTable() {
        const tbody = document.getElementById('tableBody');
        const search = document.getElementById('globalSearch').value.toLowerCase();
        const fCat = document.getElementById('filterCategory').value;
        const fCap = document.getElementById('filterCapacity').value;

        let filtered = allData.filter(item => {
            const matchSearch = Object.values(item).some(val => String(val).toLowerCase().includes(search));
            return matchSearch && (fCat==="" || item.category===fCat) && (fCap==="" || item.capacity===fCap);
        });

        document.getElementById('dataCount').innerText = `找到 ${filtered.length} 筆資料`;

        if (currentSort.field !== 'createdAt') {
            filtered.sort((a, b) => {
                let valA = a[currentSort.field] || ''; let valB = b[currentSort.field] || '';
                if(typeof valA === 'number' && typeof valB === 'number') return currentSort.isAsc ? valA - valB : valB - valA;
                valA = String(valA).toLowerCase(); valB = String(valB).toLowerCase();
                if (valA < valB) return currentSort.isAsc ? -1 : 1;
                if (valA > valB) return currentSort.isAsc ? 1 : -1;
                return 0;
            });
        }

        document.querySelectorAll('th.sortable').forEach(th => {
            const icon = th.querySelector('.sort-icon');
            if (th.dataset.sort === currentSort.field) {
                icon.innerText = currentSort.isAsc ? '▲' : '▼'; th.style.color = 'var(--primary)';
            } else {
                icon.innerText = '↕'; th.style.color = '';
            }
        });

        const totalPages = Math.ceil(filtered.length / itemsPerPage) || 1;
        if (currentPage > totalPages) currentPage = totalPages;
        const startIndex = (currentPage - 1) * itemsPerPage;
        const pagedData = filtered.slice(startIndex, startIndex + itemsPerPage);

        document.getElementById('pageInfo').innerText = `第 ${currentPage} 頁 / 共 ${totalPages} 頁`;
        document.getElementById('prevBtn').disabled = currentPage === 1;
        document.getElementById('nextBtn').disabled = currentPage === totalPages;

        if (pagedData.length === 0) {
            tbody.innerHTML = `<tr><td colspan="6" style="text-align:center; padding:40px;">找不到符合的資料</td></tr>`;
            return;
        }

        tbody.innerHTML = pagedData.map(item => `
            <tr data-id="${item.id}">
                <td data-label="類別：" data-field="category" class="${isAdmin?'editable':''}" contenteditable="${isAdmin}">${item.category||''}</td>
                <td data-label="機種：" data-field="machineModel" class="${isAdmin?'editable':''}" contenteditable="${isAdmin}">${item.machineModel||''}</td>
                <td data-label="能力別：" data-field="capacity" class="${isAdmin?'editable':''}" contenteditable="${isAdmin}">${item.capacity||''}</td>
                <td data-label="零件名稱：" data-field="partName" class="${isAdmin?'editable':''}" contenteditable="${isAdmin}">${item.partName||''}</td>
                <td data-label="品番：" data-field="partNumber" class="${isAdmin?'editable':''}" contenteditable="${isAdmin}">${item.partNumber||''}</td>
                <td data-label="工時(分)：" data-field="laborTime" class="${isAdmin?'editable':''}" contenteditable="${isAdmin}">${item.laborTime||0}</td>
            </tr>
        `).join('');
    }

    document.getElementById('prevBtn').onclick = () => { if(currentPage > 1) { currentPage--; renderTable(); }};
    document.getElementById('nextBtn').onclick = () => { currentPage++; renderTable(); };

    document.getElementById('tableBody').addEventListener('dblclick', (e) => {
        const td = e.target.closest('td');
        if (!td) return;
        window.getSelection().removeAllRanges();
        copyToClipboard(td.innerText.trim());
    });

    document.getElementById('tableBody').addEventListener('click', (e) => {
        const td = e.target.closest('td');
        if (!td) return;

        if (isAdmin) {
            const item = allData.find(d => d.id === td.closest('tr').dataset.id);
            if (item) {
                document.getElementById('inCat').value = item.category || '';
                document.getElementById('inModel').value = item.machineModel || '';
                document.getElementById('inCap').value = item.capacity || '';
                document.getElementById('inName').value = item.partName || '';
                document.getElementById('inNo').value = item.partNumber || '';
                document.getElementById('inTime').value = item.laborTime || '';
                
                formWrapper.style.display = 'block';
                toggleBtn.innerHTML = '➖ 收起建檔表單';
                updateFormCapacityDatalist();
            }
        }
    });

    document.getElementById('tableBody').addEventListener('blur', async (e) => {
        if (!isAdmin) return;
        const td = e.target.closest('td[contenteditable="true"]');
        if (!td) return;
        
        const id = td.closest('tr').dataset.id;
        const field = td.dataset.sort || td.dataset.field; 
        let newVal = td.innerText.trim();
        const finalVal = (field === 'laborTime') ? Number(newVal) : newVal;
        
        const oldData = allData.find(d => d.id === id);
        if (oldData && oldData[field] === finalVal) return;

        try { await updateDoc(doc(db, "labor_costs", id), { [field]: finalVal }); showToast('修改已儲存'); } 
        catch (err) { showToast("錯誤："+err.message, 'error'); }
    }, true);

    function updateBaseFilters() {
        const cats = [...new Set(allData.map(i => i.category).filter(Boolean))];
        const models = [...new Set(allData.map(i => i.machineModel).filter(Boolean))];
        const names = [...new Set(allData.map(i => i.partName).filter(Boolean))];

        const filterCat = document.getElementById('filterCategory');
        const curCat = filterCat.value;
        filterCat.innerHTML = `<option value="">所有類別</option>` + cats.map(i => `<option value="${i}">${i}</option>`).join('');
        filterCat.value = curCat;

        document.getElementById('listCategory').innerHTML = cats.map(i => `<option value="${i}">`).join('');
        document.getElementById('listModel').innerHTML = models.map(i => `<option value="${i}">`).join('');
        document.getElementById('listPartName').innerHTML = names.map(i => `<option value="${i}">`).join('');

        updateFilterCapacityDropdown();
        updateFormCapacityDatalist();
    }

    function updateFilterCapacityDropdown() {
        const catVal = document.getElementById('filterCategory').value;
        const capSelect = document.getElementById('filterCapacity');
        const currentCap = capSelect.value;
        let validCaps = catVal 
            ? [...new Set(allData.filter(d => d.category === catVal).map(d => d.capacity).filter(Boolean))]
            : [...new Set(allData.map(d => d.capacity).filter(Boolean))];

        capSelect.innerHTML = `<option value="">所有能力別</option>` + validCaps.map(i => `<option value="${i}">${i}</option>`).join('');
        capSelect.value = validCaps.includes(currentCap) ? currentCap : "";
    }

    function updateFormCapacityDatalist() {
        const inCatVal = document.getElementById('inCat').value.trim();
        let validCaps = inCatVal
            ? [...new Set(allData.filter(d => d.category === inCatVal).map(d => d.capacity).filter(Boolean))]
            : [...new Set(allData.map(d => d.capacity).filter(Boolean))];

        document.getElementById('listCapacity').innerHTML = validCaps.map(i => `<option value="${i}">`).join('');
    }

    document.getElementById('filterCategory').onchange = () => { updateFilterCapacityDropdown(); currentPage = 1; renderTable(); };
    document.getElementById('filterCapacity').onchange = () => { currentPage = 1; renderTable(); };
    document.getElementById('globalSearch').oninput = () => { currentPage = 1; renderTable(); };
    document.getElementById('inCat').addEventListener('input', updateFormCapacityDatalist);

    document.getElementById('addForm').onsubmit = async (e) => {
        e.preventDefault();
        if (!isAdmin) return;

        const newModel = document.getElementById('inModel').value.trim();
        const newNo = document.getElementById('inNo').value.trim();

        const isDuplicate = allData.some(item => 
            item.machineModel === newModel && 
            item.partNumber === newNo
        );

        if (isDuplicate) {
            showToast(`⚠️ 寫入失敗：該機種 [${newModel}] 已存在相同品番 [${newNo}] 的資料！`, 'error');
            return; 
        }

        try {
            await addDoc(collection(db, "labor_costs"), {
                category: document.getElementById('inCat').value.trim(),
                machineModel: newModel,
                capacity: document.getElementById('inCap').value.trim(),
                partName: document.getElementById('inName').value.trim(),
                partNumber: newNo,
                laborTime: Number(document.getElementById('inTime').value),
                createdAt: new Date()
            });
            document.getElementById('addForm').reset();
            updateFormCapacityDatalist(); 
            showToast("成功新增一筆資料！", 'success');
        } catch (e) {
            showToast("新增錯誤：" + e.message, 'error');
        }
    };
</script>
