<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>空調零件工時管理系統</title>
    <style>
        :root { --primary: #2c3e50; --admin: #27ae60; }
        body { font-family: "Microsoft JhengHei", sans-serif; background: #f4f7f6; margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        
        /* 頂部列 */
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; margin-bottom: 20px; padding-bottom: 10px; }
        .user-info { font-size: 14px; color: #666; }
        
        /* 搜尋區塊 */
        .search-section { background: #f9f9f9; padding: 15px; border-radius: 8px; margin-bottom: 20px; display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; }
        .search-section input, .search-section select { padding: 8px; border: 1px solid #ddd; border-radius: 4px; }
        .full-search { grid-column: 1 / -1; }

        /* 新增區塊 (管理員) */
        #adminArea { display: none; background: #e8f5e9; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px dashed var(--admin); }
        .input-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; }
        
        /* 表格樣式 */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; }
        th, td { border: 1px solid #eee; padding: 12px; text-align: left; }
        th { background: var(--primary); color: white; cursor: pointer; }
        tr:hover { background: #f1f1f1; }
        
        /* 管理員編輯樣式 */
        .editable { background: #fffde7; cursor: text; border-bottom: 2px dashed #ffd600; }
        .editable:focus { background: #fff9c4; outline: none; border-bottom: 2px solid #f9a825; }

        .btn { padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; transition: 0.3s; }
        .btn-login { background: #4285F4; color: white; }
        .btn-save { background: var(--admin); color: white; margin-top: 10px; width: 100%; }
        .badge-admin { background: #e8f5e9; color: var(--admin); padding: 2px 8px; border-radius: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>工時費查詢系統</h1>
        <div id="authArea">
            <button class="btn btn-login" id="loginBtn">Google 登入 (管理員)</button>
        </div>
    </div>

    <div class="search-section">
        <input type="text" id="globalSearch" class="full-search" placeholder="🔍 全域搜尋 (輸入關鍵字即可篩選目前顯示的資料)...">
        <select id="filterCategory"><option value="">所有類別</option></select>
        <select id="filterMachine"><option value="">所有機種</option></select>
        <select id="filterCapacity"><option value="">所有能力別</option></select>
    </div>

    <div id="adminArea">
        <strong style="color:var(--admin)">✚ 新增資料項目</strong>
        <form id="addForm" class="input-row">
            <input type="text" id="inCat" placeholder="類別" required>
            <input type="text" id="inModel" placeholder="機種" required>
            <input type="text" id="inCap" placeholder="能力別" required>
            <input type="text" id="inName" placeholder="零件名稱" required>
            <input type="text" id="inNo" placeholder="品番" required>
            <input type="number" id="inTime" placeholder="工時(分)" required>
            <button type="submit" class="btn btn-save">儲存到資料庫</button>
        </form>
        <p style="font-size: 12px; color: #666; margin-top: 10px;">提示：登入後可直接點擊下方表格內文字進行即時修改並自動存檔。</p>
    </div>

    <table id="mainTable">
        <thead>
            <tr>
                <th>類別</th>
                <th>機種</th>
                <th>能力別</th>
                <th>零件名稱</th>
                <th>品番</th>
                <th>工時(分)</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            <tr><td colspan="6" style="text-align:center">資料載入中...</td></tr>
        </tbody>
    </table>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, limit, orderBy, updateDoc, doc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDvTOPoq1WdGLCOafP6GSZlxKR8TzM0Aqs",
        authDomain: "working-hours-dce8e.firebaseapp.com",
        projectId: "working-hours-dce8e",
        storageBucket: "working-hours-dce8e.firebasestorage.app",
        messagingSenderId: "866502758932",
        appId: "1:866502758932:web:3080e744b57e8898468d01",
        measurementId: "G-BB7FM14GPN"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();
    const adminEmail = "jingsyuan@gmail.com";

    let isAdmin = false;
    let allData = [];

    // --- 權限控管 ---
    onAuthStateChanged(auth, (user) => {
        const authArea = document.getElementById('authArea');
        const adminArea = document.getElementById('adminArea');
        
        if (user) {
            isAdmin = user.email === adminEmail;
            authArea.innerHTML = `<span class="user-info">${user.email} ${isAdmin ? '<span class="badge-admin">管理員</span>' : ''}</span> <button class="btn" onclick="location.reload()">登出</button>`;
            authArea.querySelector('button').onclick = () => signOut(auth);
            if (isAdmin) adminArea.style.display = "block";
        } else {
            isAdmin = false;
            document.getElementById('loginBtn').onclick = () => signInWithPopup(auth, provider);
        }
        renderTable(); // 權限變動後重新渲染表格
    });

    // --- 資料讀取 (監聽前 20 筆) ---
    const q = query(collection(db, "labor_costs"), orderBy("createdAt", "desc"), limit(20));
    onSnapshot(q, (snapshot) => {
        allData = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
        updateFilters();
        renderTable();
    });

    // --- 渲染表格 ---
    function renderTable() {
        const tbody = document.getElementById('tableBody');
        const globalSearch = document.getElementById('globalSearch').value.toLowerCase();
        const fCat = document.getElementById('filterCategory').value;
        const fModel = document.getElementById('filterMachine').value;
        const fCap = document.getElementById('filterCapacity').value;

        // 篩選邏輯
        const filtered = allData.filter(item => {
            const matchGlobal = Object.values(item).some(val => String(val).toLowerCase().includes(globalSearch));
            const matchCat = fCat === "" || item.category === fCat;
            const matchModel = fModel === "" || item.machineModel === fModel;
            const matchCap = fCap === "" || item.capacity === fCap;
            return matchGlobal && matchCat && matchModel && matchCap;
        });

        tbody.innerHTML = filtered.map(item => `
            <tr>
                <td class="${isAdmin ? 'editable' : ''}" contenteditable="${isAdmin}" onblur="updateField('${item.id}', 'category', this.innerText)">${item.category || ''}</td>
                <td class="${isAdmin ? 'editable' : ''}" contenteditable="${isAdmin}" onblur="updateField('${item.id}', 'machineModel', this.innerText)">${item.machineModel || ''}</td>
                <td class="${isAdmin ? 'editable' : ''}" contenteditable="${isAdmin}" onblur="updateField('${item.id}', 'capacity', this.innerText)">${item.capacity || ''}</td>
                <td class="${isAdmin ? 'editable' : ''}" contenteditable="${isAdmin}" onblur="updateField('${item.id}', 'partName', this.innerText)">${item.partName || ''}</td>
                <td class="${isAdmin ? 'editable' : ''}" contenteditable="${isAdmin}" onblur="updateField('${item.id}', 'partNumber', this.innerText)">${item.partNumber || ''}</td>
                <td class="${isAdmin ? 'editable' : ''}" contenteditable="${isAdmin}" onblur="updateField('${item.id}', 'laborTime', this.innerText)">${item.laborTime || 0}</td>
            </tr>
        `).join('');
    }

    // --- 即時更新資料庫 ---
    window.updateField = async (id, field, value) => {
        if (!isAdmin) return;
        const docRef = doc(db, "labor_costs", id);
        try {
            let finalValue = (field === 'laborTime') ? Number(value) : value;
            await updateDoc(docRef, { [field]: finalValue });
            console.log("更新成功");
        } catch (e) {
            alert("更新失敗：" + e.message);
        }
    };

    // --- 更新選單篩選器 ---
    function updateFilters() {
        const categories = [...new Set(allData.map(i => i.category))];
        const models = [...new Set(allData.map(i => i.machineModel))];
        const caps = [...new Set(allData.map(i => i.capacity))];

        const updateSelect = (id, list) => {
            const select = document.getElementById(id);
            const current = select.value;
            select.innerHTML = `<option value="">全部</option>` + list.map(i => `<option value="${i}">${i}</option>`).join('');
            select.value = current;
        };

        updateSelect('filterCategory', categories);
        updateSelect('filterMachine', models);
        updateSelect('filterCapacity', caps);
    }

    // --- 搜尋事件監聽 ---
    document.getElementById('globalSearch').oninput = renderTable;
    document.getElementById('filterCategory').onchange = renderTable;
    document.getElementById('filterMachine').onchange = renderTable;
    document.getElementById('filterCapacity').onchange = renderTable;

    // --- 新增資料 ---
    document.getElementById('addForm').onsubmit = async (e) => {
        e.preventDefault();
        if (!isAdmin) return;

        try {
            await addDoc(collection(db, "labor_costs"), {
                category: document.getElementById('inCat').value,
                machineModel: document.getElementById('inModel').value,
                capacity: document.getElementById('inCap').value,
                partName: document.getElementById('inName').value,
                partNumber: document.getElementById('inNo').value,
                laborTime: Number(document.getElementById('inTime').value),
                createdAt: new Date()
            });
            document.getElementById('addForm').reset();
            alert("新增成功！");
        } catch (e) {
            alert("錯誤：" + e.message);
        }
    };
</script>

</body>
</html>
